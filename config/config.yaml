# CXR Intelligence System - Configuration

#  Model Paths / IDs 
models:
  medgemma:
    model_id: "google/medgemma-4b-it"          # HuggingFace model ID
    # Alternatives:
    # "google/medgemma-27b-it"                 # Larger, better performance
    # "google/medgemma-1.5-4b-it"              # Lighter multimodal
    load_in_4bit: true                         # QLoRA quantization for VRAM
    max_new_tokens: 512
    temperature: 0.3
    top_p: 0.9
    device: "auto"                             # "cuda", "cpu", or "auto"

  colpali:
    model_id: "vidore/colpali-v1.2"            # ColPali checkpoint
    # Alternatives:
    # "vidore/colpali-v1.3"
    # "vidore/colqwen2-v1.0"                   # ColQwen2 variant
    device: "auto"
    batch_size: 4

  clip:
    model_id: "openai/clip-vit-large-patch14"  # CLIP checkpoint
    # Alternatives (via open_clip):
    # "hf-hub:microsoft/BiomedCLIP-PubMedBERT_256-vit_base_patch16_224"
    device: "auto"

#  RAG Configuration 
rag:
  retriever: "colpali"                         # "colpali" | "clip"
  top_k: 5                                     # Number of retrieved docs
  vector_store:
    type: "faiss"                              # "faiss" | "chroma"
    index_path: "data/vector_store/index.faiss"
    metadata_path: "data/vector_store/metadata.json"
  chunk_size: 512
  chunk_overlap: 64

#  Report Generation 
report_generation:
  primary_model: "medgemma"
  comparison_model: "clip"
  prompt_template: "templates/report_prompt.txt"
  output_sections:
    - "Findings"
    - "Impression"
    - "Recommendations"

#  QA Mode 
qa:
  generator_model: "medgemma"
  retriever: "colpali"
  max_context_length: 1024
  system_prompt: >
    You are a radiologist assistant. Answer clinical questions
    about chest X-rays based solely on the provided context and image.
    Be precise and evidence-based.

#  Data 
data:
  mimic_cxr_path: "data/mimic_cxr"            # Path to MIMIC-CXR dataset
  sample_reports_path: "data/sample_reports"
  knowledge_base_path: "data/knowledge_base"
  supported_formats: ["jpg", "jpeg", "png", "dcm"]

#  Evaluation 
evaluation:
  metrics: ["bleu", "rouge_l", "meteor", "bertscore", "semb"]
  bertscore_model: "dmis-lab/biobert-base-cased-v1.2"
  output_dir: "results/evaluation"

#  Logging 
logging:
  level: "INFO"
  log_dir: "logs"
  log_file: "cxr_intelligence.log"

#  Application 
app:
  title: "CXR Intelligence System"
  description: "Multi-Modal Chest X-Ray Report Generation & QA"
  server_port: 7860
  share: false
  theme: "soft"
  max_image_size: 1024
